# ----------------------------------------------------- 
# Window rules
# ----------------------------------------------------- 

windowrule {
  name = windowrule-1
  tile = on
  match:title = (^(Microsoft-edge)$)
}

windowrule {
  name = windowrule-2
  tile = on
  match:title = ^(Brave-browser)$
  size = 600 400
}

windowrule {
  name = windowrule-3
  tile = on
  match:title = ^(Chromium)$
}

windowrule {
  name = windowrule-4
  tile = on
  match:title = ^(pavucontrol)$
}

windowrule {
  name = windowrule-5
  tile = on
  match:title = ^(blueman-manager)$
}


# Specific to launching floating terminal windows
windowrule {
  name = windowrule-6
  float = on
  match:class = floating
  size = 800 600
}