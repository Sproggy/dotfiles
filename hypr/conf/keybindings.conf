$mainMod = SUPER

bind = $mainMod, RETURN, exec, alacritty
bind = $mainMod, Q, killactive
bind = $mainMod, M, fullscreen
bind = $mainMod, F, exec, thunar
#bind = $mainMod, F, exec, dolphin
#bind = $mainMod, V, togglefloating # disabled as doesnt resize windows correctly

### added script to togglefloating to enable proper resizing ###
###      using hyprctrl to resize and centre on screen       ###
###   you can set the desired window size want ie: 800 600   ###

bind = $mainMod, V, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 1024 768 && hyprctl dispatch centerwindow

###                                                          ###

bind = $mainMod, B, exec, brave
bind = $mainMod CTRL, B, exec, chromium
bind = $mainMod, J, layoutmsg, togglesplit   
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, X, exit
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, R, exec, hyprctl reload
bind = $mainMod, W, exec, bash ~/dotfiles/hypr/scripts/matuwall-toggle.sh
bind = $mainMod, C, exec, hyprpicker


###            added script to reset hyprland with hyprctl                ###
###      after taking screenshot where the keybindings stop working       ###

bind = $mainMod, PRINT, exec, ~/dotfiles/scripts/screenshot.sh && hyprctl dispatch submap reset

# for users who have mini keyboards with no PrintScr
bind = $mainMod, P, exec, ~/dotfiles/scripts/screenshot.sh && hyprctl dispatch submap reset 

###                                                                       ###

bind = $mainMod CTRL, Q, exec, ~/dotfiles/hyprlogout/logout.sh
bind = $mainMod SHIFT, W, exec, ~/dotfiles/scripts/updatewal-awww.sh
bind = $mainMod CTRL, W, exec, ~/dotfiles/scripts/wallpaper-awww.sh
bind = $mainMod CTRL, RETURN, exec, ~/dotfiles/scripts/applauncher.sh
bind = $mainMod SHIFT, B, exec, ~/dotfiles/waybar/launch.sh
bind = $mainMod CTRL, F, exec, ~/dotfiles/scripts/filemanager.sh
bind = $mainMod CTRL, C, exec, ~/dotfiles/scripts/cliphist.sh
bind = $mainMod CTRL, T, exec, ~/dotfiles/waybar/themeswitcher.sh
bind = $mainMod SHIFT, Print, exec, ~/.config/hypr/scripts/wf-record-start.sh # record screen
bind = $mainMod ALT, Print, exec, ~/.config/hypr/scripts/wf-record-stop.sh # stop recording screen
bind = $mainMod SHIFT, P, exec, ~/.config/hypr/scripts/wf-record-start.sh # record screen for mini keyboards
bind = $mainMod ALT, P, exec, ~/.config/hypr/scripts/wf-record-stop.sh # stop recording screen for mini keyboards

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod SHIFT, right, resizeactive, 100 0
bind = $mainMod SHIFT, left, resizeactive, -100 0
bind = $mainMod SHIFT, up, resizeactive, 0 -100
bind = $mainMod SHIFT, down, resizeactive, 0 100

binde = , XF86MonBrightnessUp, exec, brightnessctl set 100%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 70%

# ----------------------------------------------------- 
# Passthrough SUPER KEY to Virtual Machine
# ----------------------------------------------------- 
bind = $mainMod, P, submap, passthru
submap = passthru
bind = SUPER, Escape, submap, reset
submap = reset

# ----------------------------------------------------- 
# Application keybinds
# -----------------------------------------------------

bind = $mainMod CTRL, U, exec, pavucontrol
bind = $mainMod CTRL, P, exec, pamac-manager
